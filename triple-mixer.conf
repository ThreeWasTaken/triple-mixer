# sinks virtuels
GAME_SINK="tm-game"
VOICE_SINK="tm-voice"

# ce qui identifie la voix / Discord / WebRTC
VOICE_MATCHES=(
  "WEBRTC VoiceEngine"
  "Discord"
  "Vesktop"
)

# applis à ignorer complètement
IGNORE_APP_MATCHES=(
  "plasma"
  "notification"
)

# valeurs par défaut
DEFAULT_MASTER=100
DEFAULT_VOICE=100
DEFAULT_GAME=100
DEFAULT_STEP=5

# UI tray
TRAY_POLL_INTERVAL_MS=200

# outils externes
PACTL_BIN="pactl"
WPCTL_BIN="wpctl"

# état persistant
STATE_DIR="${XDG_CONFIG_HOME:-$HOME/.config}/triple-mixer"
STATE_FILE="$STATE_DIR/state"
